<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SoundTrail - 音乐分发平台</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- ffmpeg.wasm -->
  <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.7/dist/ffmpeg.min.js"></script>
  <script src="https://unpkg.com/@ffmpeg/util@0.12.1/dist/ffmpeg-util.min.js"></script>
</head>
<body>
  <header>
    <h1>🎧 SoundTrail</h1>
    <div id="auth-status"></div>
  </header>

  <main id="app">
    <!-- 动态内容由 JS 渲染 -->
  </main>

  <script>
    // ========================
    // Supabase 初始化
    // ========================
    const supabaseUrl = 'https://ihnkersdbylugobbulmy.supabase.co';
    const supabaseAnonKey = 'sb_publishable_DuarQo-rGVGViEK7hZjfTg_9urgT5ws';
    supabase = supabase.createClient(supabaseUrl, supabaseAnonKey);

    // ========================
    // 全局状态
    // ========================
    let currentUser = null;
    const ffmpeg = FFmpeg.createFFmpeg({ log: false });

    // ========================
    // 路由系统
    // ========================
    window.addEventListener('hashchange', renderPage);
    window.addEventListener('load', async () => {
      const { data: { session } } = await supabase.auth.getSession();
      currentUser = session?.user || null;
      updateAuthStatus();
      renderPage();
    });

    function renderPage() {
      const hash = window.location.hash.slice(1) || 'home';
      const app = document.getElementById('app');
      app.innerHTML = '<div class="loading">加载中...</div>';

      if (hash === 'home') {
        showHome();
      } else if (hash.startsWith('user/')) {
        const userId = hash.split('/');
        showUserPage(userId);
      } else if (hash.startsWith('song/')) {
        const songId = hash.split('/');
        const urlParams = new URLSearchParams(window.location.search);
        const distributorId = urlParams.get('distributor');
        showSongPage(songId, distributorId);
      } else {
        showHome();
      }
    }

    function navigateTo(path) {
      window.location.hash = path;
    }

    // ========================
    // 认证状态
    // ========================
    async function updateAuthStatus() {
      const el = document.getElementById('auth-status');
      if (currentUser) {
        const { data: profile } = await supabase
          .from('users')
          .select('balance, display_name')
          .eq('id', currentUser.id)
          .single();
        el.innerHTML = `
          <span>你好, ${profile.display_name} | 积分: ${profile.balance}</span>
          <button onclick="logout()">退出</button>
          <button onclick="navigateTo('user/${currentUser.id}')">我的主页</button>
        `;
      } else {
        el.innerHTML = `
          <button onclick="showLogin()">登录 / 注册</button>
        `;
      }
    }

    async function logout() {
      await supabase.auth.signOut();
      currentUser = null;
      updateAuthStatus();
      navigateTo('home');
    }

    async function showLogin() {
      const email = prompt('请输入邮箱:');
      const password = prompt('请输入密码:');
      if (!email || !password) return;

      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) {
        alert('登录失败: ' + error.message);
        return;
      }
      const { data: { session } } = await supabase.auth.getSession();
      currentUser = session.user;
      updateAuthStatus();
      navigateTo('home');
    }

    // ========================
    // 首页：歌曲库（瀑布流）
    // ========================
    async function showHome() {
      const { data: songs } = await supabase
        .from('songs')
        .select(`
          *,
          creator:users(display_name)
        `)
        .order('created_at', { ascending: false });

      let html = `
        <div class="header-actions">
          <h2>最新歌曲</h2>
          <div>
            <button onclick="sortSongs('created_at')">按时间</button>
            <button onclick="sortSongs('distribution_count')">按热度</button>
          </div>
        </div>
        <div class="masonry-grid">
      `;

      songs.forEach(song => {
        html += `
          <div class="card">
            <h3>${song.title}</h3>
            <p class="artist">by ${song.creator.display_name}</p>
            <p class="stats">分发: ${song.distribution_count}</p>
            <button class="btn-audio" onclick="playPreview('${song.id}')">▶ 试听 30s</button>
            <a href="#song/${song.id}?distributor=${song.creator.id}" class="btn-link">详情</a>
          </div>
        `;
      });

      html += '</div>';
      document.getElementById('app').innerHTML = html;
    }

    async function sortSongs(by) {
      const { data: songs } = await supabase
        .from('songs')
        .select(`*, creator:users(display_name)`)
        .order(by, { ascending: false });

      const grid = document.querySelector('.masonry-grid');
      grid.innerHTML = '';
      songs.forEach(song => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <h3>${song.title}</h3>
          <p class="artist">by ${song.creator.display_name}</p>
          <p class="stats">分发: ${song.distribution_count}</p>
          <button class="btn-audio" onclick="playPreview('${song.id}')">▶ 试听 30s</button>
          <a href="#song/${song.id}?distributor=${song.creator.id}" class="btn-link">详情</a>
        `;
        grid.appendChild(card);
      });
    }

    // ========================
    // 用户主页
    // ========================
    async function showUserPage(userId) {
      if (!currentUser) {
        alert('请先登录');
        navigateTo('home');
        return;
      }

      const isSelf = currentUser.id === userId;
      const { data: user } = await supabase
        .from('users')
        .select('*')
        .eq('id', userId)
        .single();

      let html = `
        <div class="profile-header">
          <h2>${user.display_name} 的主页</h2>
          ${isSelf ? '<button class="btn-primary" id="uploadBtn">上传新歌</button>' : ''}
        </div>
      `;

      if (isSelf) {
        html += `
          <div id="upload-section" style="display:none;">
            <input type="file" accept="audio/*" id="audioFile" />
            <input type="text" placeholder="歌曲标题" id="songTitle" />
          </div>
        `;
      }

      // 创作的歌曲
      const { data: createdSongs } = await supabase
        .from('songs')
        .select('*')
        .eq('creator_id', userId)
        .order('created_at', { ascending: false });

      html += `<h3>创作 (${createdSongs.length})</h3><div class="masonry-grid">`;
      createdSongs.forEach(song => {
        html += `
          <div class="card">
            <h3>${song.title}</h3>
            <p class="stats">分发: ${song.distribution_count}</p>
            <button class="btn-audio" onclick="playPreview('${song.id}')">▶ 试听</button>
          </div>
        `;
      });
      html += '</div>';

      // 分发的歌曲（非自己创作）
      const { data: distributed } = await supabase
        .from('user_songs')
        .select('song: songs(title, creator_id)')
        .eq('user_id', userId)
        .eq('is_distributor', true);

      const others = distributed.filter(r => r.song.creator_id !== userId);
      if (others.length > 0) {
        html += `<h3>分发 (${others.length})</h3><div class="masonry-grid">`;
        others.forEach(rel => {
          html += `
            <div class="card">
              <h3>${rel.song.title}</h3>
              <button class="btn-audio" onclick="playPreview('${rel.song.id}')">▶ 试听</button>
            </div>
          `;
        });
        html += '</div>';
      }

      // 收益
      const { data: earnings } = await supabase
        .from('distributor_earnings')
        .select('*, song: songs(title)')
        .or(`creator_id.eq.${userId},distributor_id.eq.${userId}`)
        .order('created_at', { ascending: false });

      if (earnings.length > 0) {
        html += `<h3>收益明细</h3><ul class="earnings-list">`;
        earnings.forEach(e => {
          const isCreator = e.creator_id === userId;
          html += `
            <li>
              <strong>${e.song.title}</strong> 
              ${isCreator ? '创作者' : '分发者'} 
              +${isCreator ? e.creator_points : e.distributor_points} 积分
            </li>
          `;
        });
        html += '</ul>';
      }

      document.getElementById('app').innerHTML = html;

      if (isSelf) {
        document.getElementById('uploadBtn').onclick = () => {
          document.getElementById('upload-section').style.display = 'block';
        };
        document.getElementById('audioFile').onchange = handleUpload;
      }
    }

    // ========================
    // 上传处理（含 ffmpeg 切割）
    // ========================
    async function handleUpload() {
      const file = document.getElementById('audioFile').files;
      const title = document.getElementById('songTitle').value.trim();
      if (!file || !title) {
        alert('请选择文件并填写标题');
        return;
      }

      try {
        if (!ffmpeg.isLoaded()) await ffmpeg.load();
        ffmpeg.FS('writeFile', 'input', await fetchFile(file));
        await ffmpeg.run('-i', 'input', '-t', '30', '-acodec', 'copy', 'preview.mp3');

        const songId = crypto.randomUUID();
        const previewData = ffmpeg.FS('readFile', 'preview.mp3');
        const fullData = ffmpeg.FS('readFile', 'input');

        // 上传到 Storage
        await supabase.storage.from('previews').upload(`${songId}.mp3`, new Blob([previewData]));
        await supabase.storage.from('full').upload(`${songId}.mp3`, new Blob([fullData]));

        // 调用数据库函数
        await supabase.rpc('upload_song', {
          _user_id: currentUser.id,
          _title: title,
          _song_id: songId
        });

        alert('上传成功！');
        navigateTo(`user/${currentUser.id}`);
      } catch (err) {
        console.error(err);
        alert('上传失败: ' + (err.message || err));
      }
    }

    function fetchFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(new Uint8Array(reader.result));
        reader.onerror = reject;
        reader.readAsArrayBuffer(file);
      });
    }

    // ========================
    // 单曲页面
    // ========================
    async function showSongPage(songId, distributorId) {
      if (!distributorId) {
        alert('必须从分发者页面进入');
        navigateTo('home');
        return;
      }

      const { data: song } = await supabase
        .from('songs')
        .select(`*, creator:users(display_name)`)
        .eq('id', songId)
        .single();

      const { data: ownership } = await supabase
        .from('user_songs')
        .select()
        .eq('user_id', currentUser?.id || '00000000-0000-0000-0000-000000000000')
        .eq('song_id', songId)
        .maybeSingle();

      let html = `
        <div class="song-header">
          <h2>${song.title}</h2>
          <p>创作者: ${song.creator.display_name}</p>
          <p>分发者: <a href="#user/${distributorId}">查看主页</a></p>
        </div>
        <div class="player">
      `;

      if (ownership) {
        // 已购买：获取完整版签名 URL
        const res = await fetch(`/api/get-full-track?song_id=${songId}`, {
          headers: { Authorization: `Bearer ${(await supabase.auth.getSession()).data.session.access_token}` }
        });
        if (res.ok) {
          const fullUrl = res.url;
          html += `<audio controls src="${fullUrl}"></audio>`;
        } else {
          html += '<p>无法加载完整版</p>';
        }
      } else {
        // 未购买：试听 + 购买
        const { data } = supabase.storage.from('previews').getPublicUrl(`${songId}.mp3`);
        html += `
          <audio controls src="${data.publicUrl}"></audio>
          <button class="btn-primary" onclick="purchaseSong('${songId}', '${distributorId}')">支付 10 积分购买</button>
        `;
      }

      html += '</div>';
      document.getElementById('app').innerHTML = html;
    }

    async function purchaseSong(songId, distributorId) {
      if (!currentUser) {
        alert('请先登录');
        return;
      }
      try {
        await supabase.rpc('purchase_song', {
          _buyer_id: currentUser.id,
          _song_id: songId,
          _distributor_id: distributorId
        });
        alert('购买成功！刷新播放完整版');
        location.reload();
      } catch (err) {
        alert('购买失败: ' + (err.message || err));
      }
    }

    // ========================
    // 试听播放
    // ========================
    async function playPreview(songId) {
      const { data } = supabase.storage.from('previews').getPublicUrl(`${songId}.mp3`);
      const audio = new Audio(data.publicUrl);
      audio.play();
    }
  </script>
</body>
</html>
